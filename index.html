<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CWK Quest Creature Drops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f1a; --surface:#161927; --surface2:#1e2235; --border:#2a2f47;
    --accent:#7c5cfc; --accent2:#c084fc; --gold:#f0c040; --text:#e8eaf6; --muted:#6b7280;
    --r1:#90a0b0; --r2:#4aade8; --r3:#f0c040;
    --bar-low:#4a6fa5; --bar-mid:#7c5cfc; --bar-high:#c084fc; --radius:10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; }

  .page-header {
    background: linear-gradient(135deg, #0d0f1a 0%, #1a1040 50%, #0d0f1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 1rem 1rem; text-align: center; position: relative; overflow: hidden;
  }
  .page-header::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(124,92,252,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .page-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.1rem, 4vw, 1.9rem);
    background: linear-gradient(135deg, #a78bfa, #f0c040);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    letter-spacing: .04em; position: relative;
  }
  .page-subtitle { font-size: .85rem; color: var(--muted); margin-top: .35rem; position: relative; }

  /* Tab sections */
  .tabs-section { background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab-group-label {
    font-size: .68rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .1em; color: var(--muted); padding: .55rem 1rem .1rem;
  }
  .tab-row {
    display: flex; gap: .4rem; padding: .45rem 1rem .6rem; flex-wrap: wrap;
  }
  .tab-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: .3rem .9rem;
    font-family: 'Rajdhani', sans-serif; font-weight: 700;
    font-size: .82rem; color: var(--muted); cursor: pointer;
    transition: all .18s; letter-spacing: .03em; white-space: nowrap;
  }
  .tab-btn:hover { border-color: var(--accent); color: var(--text); }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent; color: #fff;
  }
  .tab-btn.special { }
  .tab-btn.all-tab {
    background: linear-gradient(135deg, rgba(240,192,64,.15), rgba(240,192,64,.05));
    border-color: rgba(240,192,64,.4); color: var(--gold);
  }
  .tab-btn.all-tab.active {
    background: linear-gradient(135deg, #b8860b, #f0c040);
    border-color: transparent; color: #000;
  }
  .tab-btn.dungeon-tab {
    background: rgba(248,113,113,.06); border-color: rgba(248,113,113,.25); color: #f87171;
  }
  .tab-btn.dungeon-tab.active {
    background: linear-gradient(135deg, #991b1b, #f87171);
    border-color: transparent; color: #fff;
  }

  /* Controls */
  .controls {
    display: flex; flex-wrap: wrap; gap: .6rem;
    padding: .75rem 1rem; background: var(--surface);
    border-bottom: 1px solid var(--border); align-items: center;
  }
  .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 320px; }
  .search-wrap svg {
    position: absolute; left: .7rem; top: 50%; transform: translateY(-50%);
    color: var(--muted); width: 15px; height: 15px; pointer-events: none;
  }
  .search-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: .45rem .7rem .45rem 2.1rem;
    color: var(--text); font-family: 'Rajdhani', sans-serif;
    font-size: .9rem; outline: none; transition: border-color .18s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  select {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: .45rem .7rem; color: var(--text);
    font-family: 'Rajdhani', sans-serif; font-size: .9rem;
    outline: none; cursor: pointer; transition: border-color .18s;
  }
  select:focus { border-color: var(--accent); }
  .stat-pill {
    margin-left: auto; font-size: .8rem; color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: .3rem .8rem; white-space: nowrap;
  }
  .stat-pill span { color: var(--accent2); font-weight: 700; }

  /* Grid */
  .grid-wrap { padding: 1rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: .75rem; }

  /* Quest card */
  .quest-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: border-color .18s, transform .12s; position: relative;
  }
  .quest-card::before {
    content: ''; position: absolute; inset: 0; border-radius: var(--radius);
    background: linear-gradient(135deg, rgba(124,92,252,0.04), transparent); pointer-events: none;
  }
  .quest-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .quest-card.dungeon-card { border-color: rgba(248,113,113,.2); }
  .quest-card.dungeon-card:hover { border-color: #f87171; }
  .quest-card.dungeon-card::before {
    background: linear-gradient(135deg, rgba(248,113,113,0.04), transparent);
  }

  .quest-header {
    padding: .6rem .75rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: .5rem; flex-wrap: wrap;
  }
  .quest-name {
    font-size: .95rem; font-weight: 700; color: var(--text);
    letter-spacing: .03em; flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .quest-league-badge {
    font-size: .68rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; padding: .1rem .4rem; border-radius: 4px;
    background: rgba(124,92,252,.12); border: 1px solid rgba(124,92,252,.3);
    color: var(--accent2); flex-shrink: 0; white-space: nowrap;
  }
  .quest-league-badge.dungeon-badge {
    background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.3); color: #f87171;
  }
  .quest-meta { display: flex; gap: .4rem; flex-shrink: 0; }
  .meta-pill {
    font-size: .72rem; font-weight: 700;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: .1rem .4rem; color: var(--muted); white-space: nowrap;
  }
  .meta-pill.stamina { color: #f87171; border-color: rgba(248,113,113,.3); background: rgba(248,113,113,.08); }
  .meta-pill.xp      { color: #86efac; border-color: rgba(134,239,172,.3); background: rgba(134,239,172,.08); }

  /* Drop rows */
  .drop-list { padding: .4rem 0; }
  .drop-row {
    display: flex; align-items: center; gap: .5rem;
    padding: .3rem .75rem;
  }
  .drop-row:not(:last-child) { border-bottom: 1px solid rgba(42,47,71,.5); }
  .drop-icon-wrap {
    width: 40px; height: 40px; flex-shrink: 0;
    background: rgba(0,0,0,.3); border-radius: 6px;
    overflow: hidden; display: flex; align-items: center; justify-content: center;
  }
  .drop-icon { width: 40px; height: 40px; object-fit: contain; image-rendering: pixelated; }
  .drop-info { flex: 1; min-width: 0; }
  .drop-name-row { display: flex; align-items: center; gap: .35rem; }
  .rarity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .r1 { background: var(--r1); } .r2 { background: var(--r2); } .r3 { background: var(--r3); }
  .drop-name {
    font-size: .88rem; font-weight: 700; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: .02em;
  }
  .form-tag {
    font-size: .62rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; padding: .05rem .28rem; border-radius: 3px; flex-shrink: 0;
  }
  .form-base   { background: rgba(74,173,232,.15); color: #4aade8; border: 1px solid rgba(74,173,232,.3); }
  .form-awaken { background: rgba(192,132,252,.15); color: #c084fc; border: 1px solid rgba(192,132,252,.4); }
  .drop-bar-wrap { height: 3px; background: var(--surface2); border-radius: 2px; margin-top: .25rem; overflow: hidden; }
  .drop-bar { height: 100%; border-radius: 2px; transition: width .3s ease; }
  .bar-low  { background: var(--bar-low); }
  .bar-mid  { background: var(--bar-mid); }
  .bar-high { background: linear-gradient(90deg, var(--bar-mid), var(--bar-high)); }
  .drop-pct { font-size: .95rem; font-weight: 700; color: var(--accent2); letter-spacing: .02em; flex-shrink: 0; min-width: 52px; text-align: right; }
  .drop-pct.low { color: var(--muted); }

  .empty { grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--muted); font-size: 1rem; }
</style>
</head>

e8","name":"Twisted Tussle"},{"id":"League9","name":"Familiar Foe"},{"id":"League10","name":"Interview with Vampires"},{"id":"League11","name":"Audience with the Ice King"},{"id":"League12","name":"Trouble in Candy Kingdom"},{"id":"League13","name":"Multiverse Melee"},{"id":"League14","name":"Multiverse Melee"},{"id":"League15","name":"Multiverse Melee"},{"id":"League16","name":"Corn Kingdom"},{"id":"League17","name":"Classic Game"},{"id":"League18","name":"Original Mix Melee"},{"id":"League19","name":"7 Of Color"},{"id":"League20","name":"Candy Factory"},{"id":"League21","name":"Sour Vizier"},{"id":"League22","name":"Darkness Barrier"},{"id":"League23","name":"Guest in the Cave"}]};
const IMG = 'icons_creatures/';

let selectedTab = 'ALL';
let searchQuery = '';
let rarityFilter = 'all';
let formFilter = 'all';

// Build special tabs: ALL + Dungeons tab + each dungeon loadout
const specialTabsEl = document.getElementById('special-tabs');
const mainTabsEl = document.getElementById('main-tabs');

function makeTab(id, label, extraClass, container) {
  const btn = document.createElement('button');
  btn.className = 'tab-btn ' + (extraClass || '');
  btn.textContent = label;
  btn.dataset.tab = id;
  btn.onclick = () => selectTab(id);
  container.appendChild(btn);
  return btn;
}

// ALL tab
makeTab('ALL', '★ All', 'all-tab', specialTabsEl);

// Dungeons tab (shows all dungeons)
makeTab('DUNGEONS', '☠ Dungeons', 'dungeon-tab', specialTabsEl);

// Individual dungeon tabs
const dungeonQuests = RAW.quests.filter(q => q.category === 'dungeon');
dungeonQuests.forEach(q => {
  makeTab(q.questID, q.name, 'dungeon-tab', specialTabsEl);
});

// Main league tabs
RAW.mainLeagues.forEach(l => {
  makeTab(l.id, l.name, '', mainTabsEl);
});

function selectTab(id) {
  selectedTab = id;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === id);
  });
  render();
}

// Controls
document.getElementById('search').addEventListener('input', e => { searchQuery = e.target.value; render(); });
document.getElementById('rarity-filter').addEventListener('change', e => { rarityFilter = e.target.value; render(); });
document.getElementById('form-filter').addEventListener('change', e => { formFilter = e.target.value; render(); });

function fmtPct(p) {
  if (p === 0) return '0%';
  if (p < 0.01) return '<0.01%';
  return p.toFixed(p < 0.1 ? 3 : 2) + '%';
}
function barClass(p) {
  if (p < 1) return 'bar-low';
  if (p < 3) return 'bar-mid';
  return 'bar-high';
}
function getForm(cid) { return cid.endsWith('_Awaken') ? 'Awaken' : 'Base'; }

function render() {
  const grid = document.getElementById('grid');
  const q = searchQuery.toLowerCase();

  // Pick quests for current tab
  let quests;
  if (selectedTab === 'ALL') {
    quests = RAW.quests.slice();
  } else if (selectedTab === 'DUNGEONS') {
    quests = RAW.quests.filter(q => q.category === 'dungeon');
  } else if (selectedTab.startsWith('League')) {
    quests = RAW.quests.filter(q => q.leagueID === selectedTab);
  } else {
    quests = RAW.quests.filter(q => q.questID === selectedTab);
  }

  // Filter drops
  quests = quests.map(quest => {
    let drops = quest.drops.filter(d => {
      const form = getForm(d.creatureID);
      if (formFilter !== 'all' && form !== formFilter) return false;
      if (rarityFilter !== 'all' && d.rarity !== parseInt(rarityFilter)) return false;
      return true;
    });
    return { ...quest, drops };
  });

  // Search
  if (q) {
    quests = quests.filter(quest =>
      quest.name.toLowerCase().includes(q) ||
      quest.drops.some(d => d.name.toLowerCase().includes(q))
    );
    quests = quests.map(quest => {
      const questMatch = quest.name.toLowerCase().includes(q);
      const drops = questMatch ? quest.drops : quest.drops.filter(d => d.name.toLowerCase().includes(q));
      return { ...quest, drops };
    });
  }

  quests = quests.filter(q => q.drops.length > 0);

  document.getElementById('showing-count').textContent = quests.length;
  grid.innerHTML = '';

  if (quests.length === 0) {
    const el = document.createElement('div');
    el.className = 'empty';
    el.textContent = 'No quests match your filters.';
    grid.appendChild(el);
    return;
  }

  quests.forEach(quest => {
    const isDungeon = quest.category === 'dungeon';
    const maxPct = quest.drops[0]?.pct || 1;
    const showLeague = (selectedTab === 'ALL' || selectedTab === 'DUNGEONS');

    const dropsHTML = quest.drops.map(d => {
      const form = getForm(d.creatureID);
      const barW = maxPct > 0 ? Math.max(2, (d.pct / maxPct) * 100) : 0;
      return `<div class="drop-row">
        <div class="drop-icon-wrap">
          <img class="drop-icon" src="${IMG}${d.sprite}.png" alt="${d.name}" loading="lazy"
            onerror="this.style.display='none';this.parentElement.style.background='transparent'">
        </div>
        <div class="drop-info">
          <div class="drop-name-row">
            <div class="rarity-dot r${d.rarity}"></div>
            <div class="drop-name">${d.name}</div>
            <span class="form-tag form-${form.toLowerCase()}">${form}</span>
          </div>
          <div class="drop-bar-wrap">
            <div class="drop-bar ${barClass(d.pct)}" style="width:${barW}%"></div>
          </div>
        </div>
        <div class="drop-pct ${d.pct < 0.5 ? 'low' : ''}">${fmtPct(d.pct)}</div>
      </div>`;
    }).join('');

    const leagueBadge = showLeague
      ? `<span class="quest-league-badge ${isDungeon ? 'dungeon-badge' : ''}">${isDungeon ? '☠ Dungeon' : quest.leagueName}</span>`
      : '';

    const metaHTML = (quest.stamina && quest.stamina !== '?')
      ? `<div class="quest-meta">
          <span class="meta-pill stamina">⚡ ${quest.stamina}</span>
          ${quest.xp && quest.xp !== '?' ? `<span class="meta-pill xp">✦ ${parseInt(quest.xp).toLocaleString()} XP</span>` : ''}
        </div>`
      : '';

    const card = document.createElement('div');
    card.className = 'quest-card' + (isDungeon ? ' dungeon-card' : '');
    card.innerHTML = `
      <div class="quest-header">
        ${leagueBadge}
        <div class="quest-name">${quest.name}</div>
        ${metaHTML}
      </div>
      <div class="drop-list">${dropsHTML}</div>`;
    grid.appendChild(card);
  });
}

// Init
selectTab('ALL');
</script>
